<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taicun's Workspace</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px 60px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #222;
    }

    p {
      color: #666;
      font-size: 16px;
      margin-bottom: 24px;
    }

    .badge {
      display: inline-block;
      background: #e1f5fe;
      color: #0288d1;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="badge">TBD</div>
    <h1>Under Construction</h1>
    <p>我的個人主頁正在籌備中，敬請期待！</p>
  </div>

</body>
</html>
